name: 净值获取 (17:00~22:30 每30分钟)

on:
  schedule:
    # 北京时间 17:00-22:30 (UTC 09:00-14:30) 每30分钟, 工作日
    - cron: '0,30 9-14 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fetch-nav
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 净值获取
        run: python fetch_fund_nav_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      - name: 同步盈亏字段
        run: python sync_pnl_fields_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
