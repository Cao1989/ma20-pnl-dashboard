name: 盘中实时刷新

on:
  schedule:
    # 北京时间 09:00-15:55 每5分钟 (UTC 01:00-07:55)
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install chinese-calendar
      
      - name: Run realtime price fetch
        run: python fetch_realtime_price.py
        env:
          FEISHU_BASE_TOKEN: JWJ1bTzQ0aBETsseSJqcWn7EnJe
      
      - name: Commit data files
        run: |
          cp -f _site/pnl_data.json _site/pnl_data.json 2>/dev/null || true
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git add -f _site/pnl_data.json _site/history_pnl.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m 'chore: 盘中实时数据刷新' && git push)
