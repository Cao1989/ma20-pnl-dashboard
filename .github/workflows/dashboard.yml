name: 看板刷新+部署 (22:35)

on:
  schedule:
    # 北京时间 22:35 (UTC 14:35) 工作日
    - cron: '35 14 * * 1-5'
  workflow_dispatch:

concurrency:
  group: dashboard-build
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 同步盈亏字段
        run: python sync_pnl_fields_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 构建看板HTML
        run: python generate_pnl_dashboard_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 提交更新的数据文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .workbuddy/history_pnl.json .workbuddy/pnl_ledger.json .workbuddy/pnl_data.json _site/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: 更新看板数据和历史盈亏 [skip ci]"
            git push origin main
            echo "Data files committed and pushed"
          fi

      - name: 上传 Pages 构件
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
