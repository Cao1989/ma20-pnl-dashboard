name: 看板刷新+部署 (22:35)

on:
  schedule:
    # 北京时间 22:35 (UTC 14:35) 工作日
    - cron: '35 14 * * 1-5'
  workflow_dispatch:

concurrency:
  group: dashboard-build
  cancel-in-progress: false

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 导出盈亏数据
        run: python sync_pnl_fields_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 生成盈亏看板
        run: python generate_pnl_dashboard_cloud.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 准备部署目录
        run: |
          mkdir -p public
          cp pnl_dashboard.html public/index.html

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
